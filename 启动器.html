<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏启动器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Microsoft YaHei',sans-serif;
  background:linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
  color:#eaeaea;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem;
}
.container { max-width:1200px; width:100%; }
h1 {
  font-size:3rem;
  text-align:center;
  margin-bottom:3rem;
  background:linear-gradient(135deg, #e94560, #00b4d8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(400px, 1fr));
  gap:2rem;
}
.card {
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:2rem;
  border:1px solid rgba(255,255,255,0.1);
  transition:all 0.3s;
}
.card:hover {
  transform:translateY(-5px);
  border-color:rgba(233,69,96,0.3);
  box-shadow:0 10px 40px rgba(233,69,96,0.2);
}
.card-icon { font-size:4rem; margin-bottom:1rem; }
.card-title { font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; }
.card-desc { color:#b0c4de; margin-bottom:1.5rem; line-height:1.6; }
.btn {
  display:inline-block;
  padding:0.8rem 2rem;
  background:linear-gradient(135deg, #e94560, #00b4d8);
  color:white;
  text-decoration:none;
  border-radius:50px;
  font-weight:700;
  transition:all 0.3s;
}
.btn:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,180,216,0.4); }
.btn-secondary {
  background:rgba(255,255,255,0.1);
  margin-left:0.5rem;
}
.btn-secondary:hover { background:rgba(255,255,255,0.2); }
@keyframes footerGlow {
  0%,100% { text-shadow:0 0 15px rgba(255,215,0,0.9); }
  50% { text-shadow:0 0 30px rgba(255,215,0,1),0 0 50px rgba(255,215,0,0.6); }
}
</style>
</head>
<body>
<div class="container">
  <h1>🎮 游戏启动器</h1>
<div style="text-align:center; color:#FFD700; margin-bottom:2rem; font-size:1.1rem; font-weight:700; letter-spacing:0.2em; text-shadow:0 0 15px rgba(255,215,0,0.9),0 0 30px rgba(255,215,0,0.5); animation:footerGlow 2s ease-in-out infinite;">君器智能 &amp; 合瑞文化 联合出品</div>
  <div class="grid">
    <div class="card">
      <div class="card-icon">🔥</div>
      <div class="card-title">哪吒·天命逆转</div>
      <div class="card-desc">热血横版动作游戏，使用火尖枪、混天绫、风火轮对抗妖魔军团！</div>
      <a href="nezha_game.html" class="btn">▶ 开始游戏</a>
      <a href="nezha_anime.html" class="btn btn-secondary">📖 企划</a>
    </div>
    <div class="card">
      <div class="card-icon">🍃</div>
      <div class="card-title">风之回响</div>
      <div class="card-desc">宫崎骏风格魔法飞行冒险，收集记忆碎片，守护古树！</div>
      <a href="miyazaki_game.html" class="btn">✨ 开始冒险</a>
      <a href="miyazaki_anime.html" class="btn btn-secondary">📖 企划</a>
    </div>
    <div class="card">
      <div class="card-icon">🎮</div>
      <div class="card-title" style="color:#00b4d8">俄罗斯方块</div>
      <div class="card-desc">经典益智游戏高级版！大气简洁的界面，流畅的操作手感。</div>
      <a href="tetris.html" class="btn">▶ 开始游戏</a>
    </div>
  </div>
</div>
</body>
</html>
