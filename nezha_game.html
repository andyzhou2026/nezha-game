<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哪吒·天命逆转 — 动作游戏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0f; overflow:hidden; font-family:'Microsoft YaHei',sans-serif; user-select:none; }
#gameCanvas { display:block; }

/* ===== 主菜单 ===== */
#mainMenu {
  position:fixed; inset:0; z-index:100;
  background:radial-gradient(ellipse at 50% 60%, rgba(232,0,45,0.2) 0%, #0a0a0f 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.menu-bg-text {
  position:absolute; font-size:28vw; font-weight:900;
  color:rgba(255,255,255,0.025); pointer-events:none;
  animation:bgPulse 4s ease-in-out infinite;
}
@keyframes bgPulse { 0%,100%{opacity:.025;transform:scale(1)} 50%{opacity:.05;transform:scale(1.02)} }

.menu-title {
  font-size:clamp(3rem,10vw,7rem); font-weight:900;
  background:linear-gradient(135deg,#fff 0%,#ffd700 40%,#ff6a00 70%,#e8002d 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:.3rem; position:relative; z-index:1;
  animation:titleGlow 2s ease-in-out infinite;
  text-shadow:none;
}
@keyframes titleGlow { 0%,100%{filter:drop-shadow(0 0 20px rgba(255,106,0,0.5))} 50%{filter:drop-shadow(0 0 40px rgba(255,106,0,0.9))} }

.menu-en { font-size:1rem; letter-spacing:.5em; color:rgba(255,255,255,0.4); margin-bottom:.5rem; z-index:1; }
.menu-tagline { font-size:1.2rem; color:rgba(255,215,0,0.8); letter-spacing:.2em; margin-bottom:3rem; z-index:1; }

.menu-btn {
  position:relative; z-index:1; padding:1rem 3.5rem; margin:.5rem;
  font-size:1.1rem; font-family:inherit; cursor:pointer; border:none; border-radius:2px;
  letter-spacing:.2em; transition:all .3s; display:block;
}
.btn-start {
  background:linear-gradient(135deg,#e8002d,#ff6a00);
  color:#fff; box-shadow:0 0 30px rgba(232,0,45,0.4);
  animation:btnPulse 2s ease-in-out infinite;
}
@keyframes btnPulse { 0%,100%{box-shadow:0 0 30px rgba(232,0,45,0.4)} 50%{box-shadow:0 0 60px rgba(232,0,45,0.8)} }
.btn-start:hover { transform:translateY(-3px) scale(1.05); }

.menu-tip { position:relative; z-index:1; margin-top:2rem; color:rgba(255,255,255,0.3); font-size:.8rem; line-height:2; text-align:center; }
.key-badge {
  display:inline-block; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:3px; padding:.1rem .5rem; font-size:.75rem; color:rgba(255,255,255,0.6);
}
.btn-nav {
  background:transparent;
  color:rgba(255,215,0,0.7); border:1px solid rgba(255,215,0,0.3);
  font-size:.85rem; letter-spacing:.15em;
}
.btn-nav:hover { background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.6); color:#ffd700; transform:none; }
.menu-nav-row { position:relative; z-index:1; display:flex; gap:1rem; justify-content:center; margin-top:.5rem; }
.company-tag { position:absolute; bottom:1.5rem; color:rgba(255,215,0,0.5); font-size:.85rem; letter-spacing:.15em; z-index:1; }

/* ===== HUD ===== */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:50;
  padding:1rem 1.5rem; display:none;
  background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  pointer-events:none;
}
.hud-top { display:flex; justify-content:space-between; align-items:flex-start; }

.hud-char { display:flex; align-items:center; gap:.8rem; }
.char-portrait {
  width:50px; height:50px; border-radius:4px; border:2px solid rgba(255,106,0,0.6);
  background:linear-gradient(135deg,#1a0005,#3d0010);
  display:flex; align-items:center; justify-content:center; font-size:1.8rem;
}
.char-info { }
.char-name-hud { font-size:.9rem; font-weight:700; color:#ffd700; letter-spacing:.1em; }

.bar-wrap { display:flex; align-items:center; gap:.5rem; margin-top:.3rem; }
.bar-label { font-size:.65rem; color:rgba(255,255,255,0.5); width:18px; }
.bar-bg { width:160px; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width .3s; }
.hp-fill { background:linear-gradient(90deg,#e8002d,#ff6a00); }
.mp-fill { background:linear-gradient(90deg,#0066ff,#00e5ff); }

.hud-score { text-align:right; }
.score-label { font-size:.7rem; letter-spacing:.2em; color:rgba(255,255,255,0.4); }
.score-val { font-size:1.8rem; font-weight:900; color:#ffd700; }
.wave-info { font-size:.75rem; color:rgba(255,106,0,0.8); margin-top:.2rem; letter-spacing:.1em; }

/* ===== 技能栏 ===== */
#skillBar {
  position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%);
  display:none; gap:1rem; z-index:50; pointer-events:none;
}
.skill-slot {
  width:64px; height:64px; border-radius:6px; position:relative;
  border:2px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.6);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:all .2s;
}
.skill-slot.ready { border-color:rgba(255,215,0,0.6); box-shadow:0 0 15px rgba(255,215,0,0.2); }
.skill-slot.cooling { border-color:rgba(255,255,255,0.1); }
.skill-icon-big { font-size:1.8rem; line-height:1; }
.skill-key { font-size:.6rem; color:rgba(255,255,255,0.5); margin-top:.2rem; letter-spacing:.05em; }
.skill-name-small { font-size:.55rem; color:rgba(255,255,255,0.4); }
.cd-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:700; color:rgba(255,255,255,0.8);
}

/* ===== 游戏结束/胜利界面 ===== */
#overlay {
  position:fixed; inset:0; z-index:80; display:none;
  align-items:center; justify-content:center; flex-direction:column;
  background:rgba(0,0,0,0.75);
}
.overlay-title { font-size:4rem; font-weight:900; margin-bottom:1rem; }
.overlay-sub { font-size:1.2rem; color:rgba(255,255,255,0.6); margin-bottom:2rem; letter-spacing:.2em; }
.overlay-score { font-size:2rem; color:#ffd700; margin-bottom:2.5rem; }
.overlay-btn {
  padding:.9rem 3rem; font-size:1rem; font-family:inherit;
  background:linear-gradient(135deg,#e8002d,#ff6a00); color:#fff;
  border:none; border-radius:2px; cursor:pointer; letter-spacing:.2em;
  transition:all .3s;
}
.overlay-btn:hover { transform:translateY(-2px); box-shadow:0 0 30px rgba(232,0,45,0.6); }

/* ===== 伤害数字 ===== */
.dmg-float {
  position:fixed; pointer-events:none; font-weight:900; z-index:60;
  animation:floatUp .8s ease forwards;
  text-shadow:0 2px 8px rgba(0,0,0,0.8);
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.3)} }

/* ===== 技能提示 ===== */
#skillTip {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:70; text-align:center; pointer-events:none;
  animation:tipFlash .6s ease forwards;
  display:none;
}
@keyframes tipFlash { 0%{opacity:0;transform:translate(-50%,-50%) scale(.5)} 30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)} 70%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-50%) scale(1)} }
.tip-name { font-size:2rem; font-weight:900; color:#ffd700; text-shadow:0 0 20px rgba(255,215,0,0.8); }
</style>
</head>
<body>

<!-- 主菜单 -->
<div id="mainMenu">
  <div class="menu-bg-text">哪吒</div>
  <div class="menu-title">哪吒</div>
  <div class="menu-en">NEZHA · FATE REVERSED</div>
  <div class="menu-tagline">「我命由我不由天」</div>
  <button class="menu-btn btn-start" onclick="startGame()">▶ 开始游戏</button>
  <div class="menu-nav-row">
    <button class="menu-btn btn-nav" onclick="location.href='index.html'" style="padding:.6rem 1.8rem;font-size:.8rem;">🏠 返回主页</button>
    <button class="menu-btn btn-nav" onclick="location.href='nezha_anime.html'" style="padding:.6rem 1.8rem;font-size:.8rem;">📖 动漫企划</button>
  </div>
  <div class="menu-tip">
    <span class="key-badge">← →</span> 移动 &nbsp;
    <span class="key-badge">↑ / Space</span> 跳跃 &nbsp;
    <span class="key-badge">Z</span> 普攻<br>
    <span class="key-badge">X</span> 火尖枪 &nbsp;
    <span class="key-badge">C</span> 混天绫 &nbsp;
    <span class="key-badge">V</span> 风火轮冲刺 &nbsp;
    <span class="key-badge">B</span> 魔丸爆发
  </div>
  <div class="company-tag">杭州君器智能科技有限公司 出品</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-char">
      <div class="char-portrait">🔱</div>
      <div class="char-info">
        <div class="char-name-hud">哪吒</div>
        <div class="bar-wrap">
          <span class="bar-label" style="color:#e8002d">HP</span>
          <div class="bar-bg"><div class="bar-fill hp-fill" id="hpBar" style="width:100%"></div></div>
          <span id="hpText" style="font-size:.7rem;color:rgba(255,255,255,0.5)">100/100</span>
        </div>
        <div class="bar-wrap">
          <span class="bar-label" style="color:#00e5ff">MP</span>
          <div class="bar-bg"><div class="bar-fill mp-fill" id="mpBar" style="width:100%"></div></div>
          <span id="mpText" style="font-size:.7rem;color:rgba(255,255,255,0.5)">100/100</span>
        </div>
      </div>

    <div class="hud-score">
      <div class="score-label">得分</div>
      <div class="score-val" id="scoreVal">0</div>
      <div class="wave-info" id="waveInfo">第 1 波</div>
    </div>
  </div>
</div>

<!-- 技能栏 -->
<div id="skillBar" style="display:none;flex">
  <div class="skill-slot ready" id="sk0">
    <div class="skill-icon-big">🗡️</div>
    <div class="skill-key">Z</div>
    <div class="skill-name-small">普攻</div>
  </div>
  <div class="skill-slot ready" id="sk1">
    <div class="skill-icon-big">🔱</div>
    <div class="skill-key">X</div>
    <div class="skill-name-small">火尖枪</div>
  </div>
  <div class="skill-slot ready" id="sk2">
    <div class="skill-icon-big">🌀</div>
    <div class="skill-key">C</div>
    <div class="skill-name-small">混天绫</div>
  </div>
  <div class="skill-slot ready" id="sk3">
    <div class="skill-icon-big">🌪️</div>
    <div class="skill-key">V</div>
    <div class="skill-name-small">风火轮</div>
  </div>
  <div class="skill-slot ready" id="sk4">
    <div class="skill-icon-big">💥</div>
    <div class="skill-key">B</div>
    <div class="skill-name-small">魔丸爆发</div>
  </div>
</div>

<!-- 技能提示 -->
<div id="skillTip"><div class="tip-name" id="tipName"></div></div>

<!-- 游戏结束/胜利 -->
<div id="overlay">
  <div class="overlay-title" id="overlayTitle"></div>
  <div class="overlay-sub" id="overlaySub"></div>
  <div class="overlay-score" id="overlayScore"></div>
  <button class="overlay-btn" onclick="restartGame()">再战一局</button>
</div>

<!-- 游戏画布 -->
<canvas id="gameCanvas"></canvas>

<script>
// ========================================
//  哪吒·天命逆转  横版动作游戏
// ========================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 适配屏幕
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== 游戏状态 =====
let G = {}; // 全局游戏对象
let animId = null;
let gameRunning = false;

// ===== 粒子池 =====
let particles = [];

function Particle(x,y,vx,vy,color,size,life,glow){
  return {x,y,vx,vy,color,size,life,maxLife:life,glow:glow||false,type:'normal'};
}

function spawnParticles(x,y,count,color,speed,size,life,glow){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=speed*(0.5+Math.random());
    particles.push(Particle(x,y,Math.cos(a)*s,Math.sin(a)*s,color,size*(0.5+Math.random()),life*(0.8+Math.random()*0.4),glow));
  }
}

function spawnFireTrail(x,y){
  const colors=['#ff6a00','#e8002d','#ffd700','#fff'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  particles.push({x:x+(Math.random()-0.5)*10,y,vx:(Math.random()-0.5)*1.5,vy:-Math.random()*3-1,
    color:c,size:Math.random()*8+3,life:0.5+Math.random()*0.4,maxLife:0.9,glow:true,type:'fire'});
}

// ===== 技能子弹 =====
let bullets = [];
let skillEffects = [];

// ===== 敌人 =====
let enemies = [];

// ===== 背景滚动 =====
let bgOffset = 0;
let bgLayers = [];

// ===== 平台 =====
let platforms = [];

// ===== 初始化游戏 =====
function initGame(){
  const W=canvas.width, H=canvas.height;
  
  particles = [];
  bullets = [];
  skillEffects = [];
  enemies = [];

  // 地面平台
  platforms = [
    {x:0, y:H-80, w:W, h:80, color:'#1a0a00'},  // 主地面
    {x:W*0.1, y:H-200, w:180, h:16, color:'#2d1500'},
    {x:W*0.35, y:H-280, w:160, h:16, color:'#2d1500'},
    {x:W*0.6, y:H-200, w:200, h:16, color:'#2d1500'},
    {x:W*0.8, y:H-320, w:140, h:16, color:'#2d1500'},
    {x:W*0.45, y:H-380, w:120, h:16, color:'#3d1500'},
  ];

  // 哪吒角色
  G.player = {
    x: W*0.15, y: H-180,
    w: 44, h: 64,
    vx:0, vy:0,
    speed:5, jumpForce:14,
    onGround:false, facingRight:true,
    hp:100, maxHp:100,
    mp:100, maxMp:100,
    mpRegen:0.05,
    score:0,
    wave:1,
    alive:true,
    // 动画
    frame:0, frameTimer:0, frameSpeed:8,
    state:'idle',  // idle/run/jump/attack/skill/hurt/demonMode
    attackTimer:0,
    hurtTimer:0,
    invincible:0,
    // 技能冷却 [普攻, 火尖枪, 混天绫, 风火轮, 魔丸爆发]
    cdMax:[0.4, 1.5, 3, 5, 12],
    cd:[0,0,0,0,0],
    // 魔丸爆发
    demonMode:false, demonTimer:0,
    // 连击
    combo:0, comboTimer:0,
    // 风火轮冲刺
    dashing:false, dashTimer:0,
  };

  G.wave = 1;
  G.waveTimer = 0;
  G.waveDelay = 3;
  G.enemyCount = 0;
  G.maxEnemies = 4;
  G.bossSpawned = false;
  
  spawnWave(1);
}

// ===== 生成波次敌人 =====
function spawnWave(wave){
  const W=canvas.width, H=canvas.height;
  let count = 3 + wave * 2;
  G.maxEnemies = count;
  G.enemyCount = 0;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(!gameRunning)return;
      const types = wave <= 2 ? ['yaksha'] : wave <= 4 ? ['yaksha','soldier'] : ['yaksha','soldier','dragon'];
      const type = types[Math.floor(Math.random()*types.length)];
      spawnEnemy(type, W*0.7 + Math.random()*W*0.25, H-144);
    }, i*600);
  }
}

function spawnEnemy(type, x, y){
  const configs = {
    yaksha:  {w:40,h:56,hp:40,maxHp:40,atk:8,spd:1.8,color:'#8B0000',icon:'👹',score:100,jump:10},
    soldier: {w:44,h:60,hp:70,maxHp:70,atk:14,spd:2.2,color:'#4a0080',icon:'👺',score:200,jump:11},
    dragon:  {w:56,h:68,hp:120,maxHp:120,atk:20,spd:2.8,color:'#003380',icon:'🐉',score:400,jump:13},
  };
  const c=configs[type];
  enemies.push({
    x,y,type,...c,
    vx:0,vy:0,onGround:false,
    facingRight:false,alive:true,
    state:'walk',
    frame:0,frameTimer:0,
    attackTimer:0, attackCd:1.5, attackRange:60,
    hurtTimer:0,
    aggroRange:500,
  });
}

// ===== 键盘 =====
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.code]=true; handleSkillKey(e.code); });
window.addEventListener('keyup',   e=>{ keys[e.code]=false; });

function handleSkillKey(code){
  if(!gameRunning) return;
  const p=G.player;
  if(!p.alive) return;
  if(code==='KeyZ') useSkill(0);
  if(code==='KeyX') useSkill(1);
  if(code==='KeyC') useSkill(2);
  if(code==='KeyV') useSkill(3);
  if(code==='KeyB') useSkill(4);
}

// ===== 技能系统 =====
const SKILLS = [
  { name:'普通攻击', mp:0,  cd:0.4,  color:'#ff9900' },
  { name:'火尖枪',   mp:10, cd:1.5,  color:'#ff3300' },
  { name:'混天绫',   mp:20, cd:3,    color:'#ff0066' },
  { name:'风火轮冲刺',mp:15, cd:5,   color:'#ff6600' },
  { name:'魔丸爆发', mp:40, cd:12,   color:'#9900ff' },
];

function useSkill(idx){
  const p=G.player;
  if(p.cd[idx]>0) return;
  const sk=SKILLS[idx];
  if(p.mp<sk.mp) return;
  p.mp-=sk.mp; p.mp=Math.max(0,p.mp);
  p.cd[idx]=sk.cd;
  updateSkillCD(idx, sk.cd);

  showSkillTip(sk.name);

  const dir = p.facingRight?1:-1;
  const bx = p.x + p.w/2 + dir*30;
  const by = p.y + p.h/2;

  if(idx===0){ // 普攻
    p.state='attack'; p.attackTimer=0.25;
    // 近战扇形伤害
    meleeAttack(p, dir, 80, 20, '#ff9900');
    spawnParticles(bx, by, 12, '#ff9900', 6, 6, 0.3, true);
  }
  else if(idx===1){ // 火尖枪
    p.state='attack'; p.attackTimer=0.3;
    bullets.push({x:bx,y:by,vx:dir*16,vy:0,w:24,h:8,dmg:35,color:'#ff3300',owner:'player',
      trail:true,life:1.5,type:'spear'});
    spawnParticles(bx,by,20,'#ff4400',8,6,0.4,true);
    spawnParticles(bx,by,10,'#ffd700',5,4,0.3,true);
  }
  else if(idx===2){ // 混天绫
    p.state='skill';
    // 横向扫荡，范围大
    const range=180;
    const hitX = dir>0 ? p.x+p.w : p.x-range;
    meleeAttack(p, dir, range, 28, '#ff0066');
    // 生成绫带特效
    skillEffects.push({type:'sash',x:p.x+p.w/2,y:p.y+p.h/2,dir,life:0.6,maxLife:0.6,color:'#ff0066'});
    spawnParticles(p.x+p.w/2, p.y+p.h/2, 30,'#ff0066',10,8,0.5,true);
    spawnParticles(p.x+p.w/2, p.y+p.h/2, 15,'#ffd700',6,4,0.3,true);
  }
  else if(idx===3){ // 风火轮冲刺
    p.dashing=true; p.dashTimer=0.4;
    p.vx=dir*22; p.invincible=0.4;
    skillEffects.push({type:'dash',x:p.x+p.w/2,y:p.y+p.h/2,dir,life:0.4,maxLife:0.4,color:'#ff6600'});
    // 冲刺伤害
    meleeAttack(p, dir, 200, 22, '#ff6600');
    spawnParticles(p.x+p.w/2, p.y+p.h/2, 40,'#ff6600',12,7,0.5,true);
  }
  else if(idx===4){ // 魔丸爆发
    p.demonMode=true; p.demonTimer=6;
    p.mp=Math.min(p.maxMp, p.mp+30);
    skillEffects.push({type:'explosion',x:p.x+p.w/2,y:p.y+p.h/2,life:1,maxLife:1,r:0,maxR:220,color:'#9900ff'});
    // AOE伤害
    enemies.forEach(e=>{
      if(!e.alive)return;
      const dx=e.x+e.w/2-(p.x+p.w/2);
      const dy=e.y+e.h/2-(p.y+p.h/2);
      if(Math.sqrt(dx*dx+dy*dy)<220){
        dealDamage(e, 60, '#9900ff');
      }
    });
    spawnParticles(p.x+p.w/2, p.y+p.h/2, 80,'#9900ff',16,10,0.8,true);
    spawnParticles(p.x+p.w/2, p.y+p.h/2, 40,'#fff',8,5,0.5,true);
  }

  updateHUD();
}

function meleeAttack(p, dir, range, dmg, color){
  enemies.forEach(e=>{
    if(!e.alive)return;
    const ex=e.x+e.w/2, ey=e.y+e.h/2;
    const px=p.x+p.w/2, py=p.y+p.h/2;
    const dx=ex-px, dy=ey-py;
    const inRange = Math.abs(dx)<range && Math.abs(dy)<80;
    const correctDir = dir>0 ? dx>-20 : dx<20;
    if(inRange && correctDir){
      dealDamage(e, dmg*(p.demonMode?1.8:1), color);
    }
  });
}

function dealDamage(enemy, dmg, color){
  if(!enemy.alive)return;
  dmg=Math.floor(dmg*(0.85+Math.random()*0.3));
  enemy.hp-=dmg;
  enemy.hurtTimer=0.25;
  enemy.vx+=(enemy.x<G.player.x?1:-1)*5;
  showDmg(enemy.x+enemy.w/2, enemy.y, dmg, color);
  spawnParticles(enemy.x+enemy.w/2, enemy.y+enemy.h/2, 10, color, 5, 4, 0.3, true);
  if(enemy.hp<=0){
    enemy.alive=false;
    G.player.score+=enemy.score*(G.player.demonMode?2:1);
    G.player.combo++;
    G.player.comboTimer=2;
    G.enemyCount++;
    // MP回复
    G.player.mp=Math.min(G.player.maxMp, G.player.mp+8);
    updateHUD();
    // 爆炸特效
    spawnParticles(enemy.x+enemy.w/2, enemy.y+enemy.h/2, 25, enemy.color, 8, 6, 0.5, true);
    spawnParticles(enemy.x+enemy.w/2, enemy.y+enemy.h/2, 15, '#ffd700', 5, 4, 0.35, true);
  }
}

// ===== 物理 =====
const GRAVITY = 0.6;

function updatePhysics(obj, dt){
  if(!obj.onGround) obj.vy+=GRAVITY;
  obj.x+=obj.vx;
  obj.y+=obj.vy;

  // 平台碰撞
  obj.onGround=false;
  platforms.forEach(p=>{
    if(obj.x+obj.w>p.x && obj.x<p.x+p.w){
      // 脚踩平台
      if(obj.vy>=0 && obj.y+obj.h>p.y && obj.y+obj.h<p.y+p.h+obj.vy+1){
        obj.y=p.y-obj.h;
        obj.vy=0;
        obj.onGround=true;
      }
      // 顶部撞平台底
      if(obj.vy<0 && obj.y<p.y+p.h && obj.y>p.y){
        obj.y=p.y+p.h;
        obj.vy=0;
      }
    }
  });

  // 水平边界
  const W=canvas.width;
  if(obj.x<0) obj.x=0;
  if(obj.x+obj.w>W) obj.x=W-obj.w;

  // 摩擦
  if(obj.onGround) obj.vx*=0.75;
  else obj.vx*=0.92;
}

// ===== 玩家更新 =====
let lastTime=0;
function updatePlayer(dt){
  const p=G.player;
  if(!p.alive)return;

  // 移动
  if(!p.dashing){
    if(keys['ArrowLeft']||keys['KeyA']){ p.vx-=p.speed; p.facingRight=false; p.state='run'; }
    else if(keys['ArrowRight']||keys['KeyD']){ p.vx+=p.speed; p.facingRight=true; p.state='run'; }
    else { if(p.onGround) p.state='idle'; }
  }

  // 跳跃
  if((keys['ArrowUp']||keys['Space']||keys['KeyW']) && p.onGround){
    p.vy=-p.jumpForce; p.onGround=false; p.state='jump';
    spawnParticles(p.x+p.w/2, p.y+p.h, 8, '#ff6600', 4, 4, 0.3);
  }

  // 物理
  updatePhysics(p, dt);

  // 冷却更新
  for(let i=0;i<5;i++){
    if(p.cd[i]>0){ p.cd[i]-=dt; if(p.cd[i]<0)p.cd[i]=0; updateSkillCD(i,p.cd[i]); }
  }

  // MP回复
  p.mp=Math.min(p.maxMp, p.mp+p.mpRegen);

  // 魔丸模式计时
  if(p.demonMode){
    p.demonTimer-=dt;
    if(p.demonTimer<=0){ p.demonMode=false; }
  }

  // 冲刺计时
  if(p.dashing){
    p.dashTimer-=dt;
    if(p.dashTimer<=0){ p.dashing=false; }
    spawnFireTrail(p.x+p.w/2, p.y+p.h);
  }

  // 攻击计时
  if(p.attackTimer>0){ p.attackTimer-=dt; if(p.attackTimer<=0)p.state='idle'; }

  // 无敌计时
  if(p.invincible>0) p.invincible-=dt;

  // 受伤计时
  if(p.hurtTimer>0){ p.hurtTimer-=dt; }

  // 连击计时
  if(p.comboTimer>0){ p.comboTimer-=dt; if(p.comboTimer<=0)p.combo=0; }

  // 火焰拖尾（魔丸模式）
  if(p.demonMode && Math.random()<0.4) spawnFireTrail(p.x+p.w/2, p.y+p.h);

  // 状态
  if(!p.onGround && p.state!='skill') p.state='jump';

  updateHUD();
}

// ===== 敌人更新 =====
function updateEnemies(dt){
  const p=G.player;
  enemies.forEach(e=>{
    if(!e.alive)return;
    const dx=p.x+p.w/2-(e.x+e.w/2);
    const dist=Math.abs(dx);
    e.facingRight=dx>0;

    // AI
    if(dist<e.aggroRange){
      if(dist>e.attackRange){
        // 追击
        e.vx+=e.facingRight?e.spd:-e.spd;
        e.state='walk';
      } else {
        // 攻击
        e.vx*=0.5;
        e.attackTimer-=dt;
        if(e.attackTimer<=0){
          e.attackTimer=e.attackCd*(0.7+Math.random()*0.6);
          e.state='attack';
          if(p.invincible<=0){
            p.hp-=e.atk;
            p.hurtTimer=0.2;
            p.invincible=0.5;
            p.vx+=e.facingRight?3:-3;
            p.vy=-4;
            showDmg(p.x+p.w/2, p.y, e.atk, '#e8002d');
            spawnParticles(p.x+p.w/2, p.y+p.h/2, 8,'#e8002d',5,4,0.3);
            if(p.hp<=0){ p.hp=0; p.alive=false; setTimeout(()=>gameOver(),800); }
            updateHUD();
          }
        }
      }
    } else {
      e.state='idle';
    }

    // 受伤闪烁
    if(e.hurtTimer>0) e.hurtTimer-=dt;

    // 偶尔跳跃
    if(e.onGround && Math.random()<0.005) e.vy=-e.jump;

    updatePhysics(e, dt);
  });

  // 子弹碰撞
  bullets.forEach(b=>{
    if(b.owner==='player'){
      enemies.forEach(e=>{
        if(!e.alive)return;
        if(b.x+b.w>e.x && b.x<e.x+e.w && b.y+b.h>e.y && b.y<e.y+e.h){
          dealDamage(e, b.dmg, b.color);
          b.life=-1;
          spawnParticles(b.x,b.y,20,b.color,7,5,0.4,true);
        }
      });
    }
  });
}

// ===== 子弹更新 =====
function updateBullets(dt){
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    b.life-=dt;
    if(b.trail) spawnFireTrail(b.x, b.y);
    // 边界
    if(b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) b.life=-1;
  });
}

// ===== 粒子更新 =====
function updateParticles(dt){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.type==='fire') p.vy-=0.05;
    else p.vy+=0.1;
    p.life-=dt*2;
    p.size*=0.97;
  });
}

// ===== 技能特效更新 =====
function updateSkillEffects(dt){
  skillEffects=skillEffects.filter(e=>e.life>0);
  skillEffects.forEach(e=>{
    e.life-=dt;
    if(e.type==='explosion') e.r=e.maxR*(1-e.life/e.maxLife);
  });
}

// ===== 波次检测 =====
function checkWave(){
  if(G.enemyCount>=G.maxEnemies && enemies.every(e=>!e.alive)){
    G.wave++;
    if(G.wave>5){ setTimeout(()=>gameWin(),500); return; }
    G.waveTimer=3;
    document.getElementById('waveInfo').textContent=`准备好！第 ${G.wave} 波`;
    setTimeout(()=>{
      if(!gameRunning)return;
      spawnWave(G.wave);
      document.getElementById('waveInfo').textContent=`第 ${G.wave} 波`;
    }, 3000);
  }
}

// ===== 绘制 =====
function drawBackground(){
  const W=canvas.width, H=canvas.height;

  // 天空渐变
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#05000f');
  sky.addColorStop(0.6,'#0a0020');
  sky.addColorStop(1,'#1a0500');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 远景山脉
  ctx.save();
  ctx.fillStyle='rgba(30,10,5,0.8)';
  ctx.beginPath(); ctx.moveTo(0,H*0.55);
  const mts=[[0.05,0.28],[0.15,0.15],[0.25,0.3],[0.38,0.1],[0.5,0.25],[0.62,0.08],[0.75,0.22],[0.88,0.12],[1,0.3]];
  mts.forEach(([x,y])=>ctx.lineTo(W*x,H*y));
  ctx.lineTo(W,H*0.55); ctx.closePath(); ctx.fill();
  ctx.restore();

  // 月亮
  ctx.save();
  const moonGrd=ctx.createRadialGradient(W*0.85,H*0.12,0,W*0.85,H*0.12,50);
  moonGrd.addColorStop(0,'rgba(255,240,200,0.9)');
  moonGrd.addColorStop(0.5,'rgba(255,220,150,0.5)');
  moonGrd.addColorStop(1,'transparent');
  ctx.fillStyle=moonGrd;
  ctx.beginPath(); ctx.arc(W*0.85,H*0.12,50,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 星星
  ctx.save();
  for(let i=0;i<60;i++){
    const sx=(Math.sin(i*137.5)*0.5+0.5)*W;
    const sy=(Math.sin(i*79.3)*0.5+0.5)*H*0.5;
    const ss=Math.sin(Date.now()/1000+i)*0.5+0.8;
    ctx.globalAlpha=0.3*ss;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(sx,sy,0.8+ss*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 地面纹理
  platforms.forEach(p=>{
    const grd=ctx.createLinearGradient(0,p.y,0,p.y+p.h);
    if(p.h>50){
      grd.addColorStop(0,'#2d1000');
      grd.addColorStop(0.3,'#1a0800');
      grd.addColorStop(1,'#0a0300');
    } else {
      grd.addColorStop(0,'#3d1800');
      grd.addColorStop(1,'#1a0800');
    }
    ctx.fillStyle=grd;
    ctx.fillRect(p.x,p.y,p.w,p.h);
    // 边缘高光
    ctx.fillStyle='rgba(255,100,0,0.15)';
    ctx.fillRect(p.x,p.y,p.w,2);
    // 火焰装饰
    if(p.h>50){
      for(let fx=50;fx<p.w;fx+=80){
        drawFlameDecor(p.x+fx, p.y);
      }
    }
  });
}

function drawFlameDecor(x,y){
  const t=Date.now()/300;
  ctx.save();
  ctx.globalAlpha=0.3;
  const grd=ctx.createRadialGradient(x,y,0,x,y,15+Math.sin(t+x)*3);
  grd.addColorStop(0,'rgba(255,180,0,0.8)');
  grd.addColorStop(0.5,'rgba(255,60,0,0.4)');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(x,y,15+Math.sin(t+x)*3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ===== 绘制哪吒 =====
function drawPlayer(){
  const p=G.player;
  ctx.save();

  // 魔丸模式光晕
  if(p.demonMode){
    const grd=ctx.createRadialGradient(p.x+p.w/2,p.y+p.h/2,0,p.x+p.w/2,p.y+p.h/2,80);
    grd.addColorStop(0,'rgba(153,0,255,0.3)');
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.beginPath();
    ctx.arc(p.x+p.w/2,p.y+p.h/2,80,0,Math.PI*2); ctx.fill();
  }

  // 受伤闪烁
  if(p.hurtTimer>0 && Math.floor(p.hurtTimer*20)%2===0){
    ctx.restore(); return;
  }

  ctx.translate(p.x+p.w/2, p.y+p.h/2);
  if(!p.facingRight) ctx.scale(-1,1);

  const t=Date.now()/200;
  const bobY = p.onGround && p.state==='idle' ? Math.sin(t)*1.5 : 0;
  const bobX = p.state==='run' ? Math.sin(t*2)*2 : 0;

  ctx.translate(bobX, bobY);

  const hw=p.w/2, hh=p.h/2;
  const dm=p.demonMode;

  // 风火轮（始终显示在脚下）
  drawWindFireWheels(dm);

  // 混天绫
  drawSash(hw, 0, dm);

  // 身体
  ctx.fillStyle = dm?'#3d0060':'#e8002d';
  roundRect(-14,-10,28,36,4); ctx.fill();
  // 红兜兜
  ctx.fillStyle=dm?'#7700aa':'#e8002d';
  ctx.beginPath();
  ctx.moveTo(-14,-10); ctx.lineTo(14,-10);
  ctx.lineTo(10,6); ctx.quadraticCurveTo(0,12,-10,6); ctx.closePath(); ctx.fill();

  // 腿
  const legSwing = p.state==='run'?Math.sin(t*3)*10:0;
  ctx.fillStyle=dm?'#1a003d':'#2c3e50';
  ctx.save(); ctx.rotate(legSwing*Math.PI/180);
  roundRect(-12,26,10,20,4); ctx.fill(); ctx.restore();
  ctx.save(); ctx.rotate(-legSwing*Math.PI/180);
  roundRect(2,26,10,20,4); ctx.fill(); ctx.restore();

  // 手臂
  const armSwing = p.state==='run'?Math.sin(t*3)*15:(p.state==='attack'?30:0);
  ctx.fillStyle='#FFDAB9';
  ctx.save(); ctx.rotate((-armSwing+10)*Math.PI/180);
  roundRect(-20,-5,8,20,4); ctx.fill(); ctx.restore();
  ctx.save(); ctx.rotate((armSwing-10)*Math.PI/180);
  roundRect(12,-5,8,20,4); ctx.fill(); ctx.restore();

  // 头
  ctx.fillStyle='#FFDAB9';
  ctx.beginPath(); ctx.ellipse(0,-hh+10,14,16,0,0,Math.PI*2); ctx.fill();

  // 发髻（两个）
  ctx.fillStyle=dm?'#220040':'#1a1a2e';
  ctx.beginPath(); ctx.ellipse(-14,-hh+2,8,10,-.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(14,-hh+2,8,10,.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=dm?'#9900ff':'#e8002d';
  ctx.beginPath(); ctx.arc(-14,-hh-4,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(14,-hh-4,5,0,Math.PI*2); ctx.fill();

  // 熊猫眼
  ctx.fillStyle='#1a0a00';
  ctx.beginPath(); ctx.ellipse(-6,-hh+10,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,-hh+10,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=dm?'#cc00ff':'#00e5ff';
  ctx.beginPath(); ctx.arc(-6,-hh+10,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-hh+10,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-4.8,-hh+8.8,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7.2,-hh+8.8,1,0,Math.PI*2); ctx.fill();

  // 嘴（不服气）
  ctx.strokeStyle='#c0392b'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-5,-hh+20); ctx.lineTo(5,-hh+20); ctx.stroke();

  // 火尖枪（攻击时显示）
  if(p.state==='attack'||p.state==='skill'){
    drawSpear(hw+10, -hh+10);
  }

  ctx.restore();
}

function drawWindFireWheels(demonMode){
  // 两个风火轮，分别在脚下左右两侧
  const t = Date.now()/100;
  const offsets = [-8, 8]; // 左轮、右轮的 x 偏移
  const wy = 24; // 相对角色中心的 y 偏移（脚踝位置）
  offsets.forEach(ox=>{
    ctx.save();
    ctx.translate(ox, wy);
    ctx.rotate(t);
    for(let s=0;s<6;s++){
      ctx.save();
      ctx.rotate(s*Math.PI/3);
      ctx.fillStyle = demonMode?'rgba(153,0,255,0.6)':'rgba(255,100,0,0.6)';
      ctx.fillRect(-2,-12,4,10);
      ctx.restore();
    }
    // 中心轮毂
    ctx.fillStyle = demonMode?'#7700aa':'#ff6600';
    ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    // 火焰光晕
    const fg = ctx.createRadialGradient(0,0,0,0,0,14);
    fg.addColorStop(0, demonMode?'rgba(153,0,255,0.5)':'rgba(255,150,0,0.5)');
    fg.addColorStop(1,'transparent');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawSash(x, y, demonMode){
  const t=Date.now()/200;
  ctx.save();
  ctx.strokeStyle=demonMode?'rgba(153,0,255,0.4)':'rgba(232,0,45,0.5)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(x,-20);
  ctx.bezierCurveTo(x+30+Math.sin(t)*15,-10,x+20,20,x+Math.sin(t+1)*10,30);
  ctx.stroke();
  ctx.restore();
}

function drawSpear(x, y){
  ctx.save();
  ctx.fillStyle='#8B4513';
  ctx.fillRect(x-2,y,4,30);
  ctx.fillStyle='#ff3300';
  ctx.beginPath();
  ctx.moveTo(x-5,y); ctx.lineTo(x+5,y); ctx.lineTo(x,y-15);
  ctx.closePath(); ctx.fill();
  // 火焰
  const sg=ctx.createRadialGradient(x,y,0,x,y,10);
  sg.addColorStop(0,'rgba(255,200,0,0.7)');
  sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ===== 绘制敌人 =====
function drawEnemy(e){
  if(!e.alive) return;
  ctx.save();

  // 受伤闪烁
  if(e.hurtTimer>0){
    ctx.globalAlpha=0.5+Math.sin(e.hurtTimer*40)*0.5;
  }

  ctx.translate(e.x+e.w/2, e.y+e.h/2);
  if(!e.facingRight) ctx.scale(-1,1);

  const hw=e.w/2, hh=e.h/2;

  // 各类型敌人
  if(e.type==='yaksha'){
    drawYaksha(hw,hh);
  } else if(e.type==='soldier'){
    drawSoldier(hw,hh);
  } else {
    drawDragonEnemy(hw,hh);
  }

  ctx.restore();

  // 血条
  const bw=e.w+10, bh=5;
  const bx=e.x-5, by=e.y-12;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=e.hp/e.maxHp>0.5?'#2ecc71':e.hp/e.maxHp>0.25?'#f39c12':'#e8002d';
  ctx.fillRect(bx,by,bw*(e.hp/e.maxHp),bh);
}

function drawYaksha(hw,hh){

  ctx.fillStyle='#5c0000';

  ctx.beginPath(); ctx.moveTo(2,-hh+2); ctx.lineTo(6,-hh-12); ctx.lineTo(10,-hh+2); ctx.closePath(); ctx.fill();
  // 眼睛
  ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(-4,-hh+10,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.arc(4,-hh+10,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-4,-hh+10,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(4,-hh+10,2,0,Math.PI*2); ctx.fill();
  // 腿
  ctx.fillStyle='#6b0000';
  roundRect(-10,20,8,16,3); ctx.fill();
  roundRect(2,20,8,16,3); ctx.fill();
}

function drawSoldier(hw,hh){
  ctx.fillStyle='#4a0080';
  roundRect(-13,-8,26,30,3); ctx.fill();
  ctx.fillStyle='#c0a000';
  roundRect(-13,-8,26,8,3); ctx.fill();
  ctx.fillStyle='#6600aa';
  ctx.beginPath(); ctx.ellipse(0,-hh+10,13,14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a006b';
  roundRect(-14,-hh+1,28,10,3); ctx.fill();
  ctx.fillStyle='#ff44ff'; ctx.beginPath(); ctx.arc(-4,-hh+10,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff44ff'; ctx.beginPath(); ctx.arc(4,-hh+10,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-4,-hh+10,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(4,-hh+10,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3d0066'; roundRect(-10,22,8,18,3); ctx.fill();
  roundRect(2,22,8,18,3); ctx.fill();
}

function drawDragonEnemy(hw,hh){
  ctx.fillStyle='#003380';
  roundRect(-16,-10,32,34,4); ctx.fill();
  ctx.fillStyle='#0044aa';
  ctx.beginPath(); ctx.ellipse(0,-hh+12,16,16,0,0,Math.PI*2); ctx.fill();
  // 龙角
  ctx.fillStyle='#001a55';
  ctx.beginPath(); ctx.moveTo(-12,-hh+4); ctx.lineTo(-8,-hh-16); ctx.lineTo(-3,-hh+4); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(3,-hh+4); ctx.lineTo(8,-hh-16); ctx.lineTo(12,-hh+4); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#00aaff'; ctx.beginPath(); ctx.arc(-5,-hh+12,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#00aaff'; ctx.beginPath(); ctx.arc(5,-hh+12,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-5,-hh+12,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(5,-hh+12,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#002266'; roundRect(-12,24,10,20,4); ctx.fill();
  roundRect(2,24,10,20,4); ctx.fill();
}

// ===== 绘制粒子 =====
function drawParticles(){
  particles.forEach(p=>{
    const alpha=Math.max(0,p.life/p.maxLife);
    ctx.save();
    ctx.globalAlpha=alpha;
    if(p.glow){ ctx.shadowBlur=p.size*2; ctx.shadowColor=p.color; }
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0,p.size),0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ===== 绘制技能特效 =====
function drawSkillEffects(){
  skillEffects.forEach(e=>{
    const alpha=e.life/e.maxLife;
    ctx.save();
    ctx.globalAlpha=alpha;
    if(e.type==='sash'){
      ctx.strokeStyle=e.color; ctx.lineWidth=5;
      ctx.shadowBlur=20; ctx.shadowColor=e.color;
      const prog=1-e.life/e.maxLife;
      for(let i=0;i<3;i++){
        const t=prog+i*0.3;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y-20);
        ctx.bezierCurveTo(
          e.x+e.dir*(80+i*30)*t, e.y+Math.sin(t*Math.PI)*40-20,
          e.x+e.dir*(160+i*40)*t, e.y+Math.sin(t*Math.PI)*20-20,
          e.x+e.dir*(200+i*50)*t, e.y-20
        );
        ctx.stroke();
      }
    }
    else if(e.type==='dash'){
      ctx.strokeStyle=e.color; ctx.lineWidth=3;
      ctx.shadowBlur=15; ctx.shadowColor=e.color;
      for(let i=0;i<5;i++){
        ctx.globalAlpha=alpha*(1-i/5)*0.6;
        ctx.beginPath();
        ctx.moveTo(e.x-e.dir*i*18, e.y-10+Math.random()*20);
        ctx.lineTo(e.x-e.dir*(i+1)*18, e.y-10+Math.random()*20);
        ctx.stroke();
      }
    }
    else if(e.type==='explosion'){
      ctx.strokeStyle=e.color; ctx.lineWidth=3;
      ctx.shadowBlur=30; ctx.shadowColor=e.color;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=alpha*0.15;
      ctx.fillStyle=e.color;
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

// ===== 绘制子弹 =====
function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowBlur=15; ctx.shadowColor=b.color;
    ctx.fillStyle=b.color;
    if(b.type==='spear'){
      ctx.save();
      const angle=Math.atan2(b.vy,b.vx);
      ctx.translate(b.x,b.y); ctx.rotate(angle);
      ctx.fillStyle='#8B4513';
      ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
      ctx.fillStyle=b.color;
      ctx.beginPath();
      ctx.moveTo(b.w/2,-b.h); ctx.lineTo(b.w/2+12,0); ctx.lineTo(b.w/2,b.h);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(b.x,b.y,b.w/2,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

// ===== 连击显示 =====
function drawCombo(){
  const p=G.player;
  if(p.combo>=2 && p.comboTimer>0){
    ctx.save();
    const alpha=Math.min(1, p.comboTimer);
    ctx.globalAlpha=alpha;
    ctx.font=`900 ${Math.min(60,24+p.combo*4)}px Microsoft YaHei`;
    ctx.textAlign='center';
    ctx.shadowBlur=20; ctx.shadowColor='#ffd700';
    const grad=ctx.createLinearGradient(0,-30,0,30);
    grad.addColorStop(0,'#ffd700'); grad.addColorStop(1,'#ff6a00');
    ctx.fillStyle=grad;
    ctx.fillText(`${p.combo} COMBO!`, canvas.width/2, canvas.height*0.35);
    ctx.restore();
  }
}

// ===== HUD更新 =====
function updateHUD(){
  const p=G.player;
  document.getElementById('hpBar').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('mpBar').style.width=(p.mp/p.maxMp*100)+'%';
  document.getElementById('hpText').textContent=`${Math.ceil(p.hp)}/${p.maxHp}`;
  document.getElementById('mpText').textContent=`${Math.floor(p.mp)}/${p.maxMp}`;
  document.getElementById('scoreVal').textContent=p.score;
}

function updateSkillCD(idx, cd){
  const slot=document.getElementById('sk'+idx);
  if(!slot)return;
  let overlay=slot.querySelector('.cd-overlay');
  const maxCd=G.player?G.player.cdMax[idx]:1;
  if(cd>0.05){
    slot.classList.remove('ready'); slot.classList.add('cooling');
    if(!overlay){ overlay=document.createElement('div'); overlay.className='cd-overlay'; slot.appendChild(overlay); }
    overlay.textContent=cd.toFixed(1);
  } else {
    slot.classList.add('ready'); slot.classList.remove('cooling');
    if(overlay)overlay.remove();
  }
}

// ===== 伤害数字 =====
function showDmg(x, y, dmg, color){
  const el=document.createElement('div');
  el.className='dmg-float';
  el.style.cssText=`left:${x}px;top:${y}px;color:${color};font-size:${dmg>30?'1.8rem':'1.2rem'}`;
  el.textContent='-'+dmg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 800);
}

// ===== 技能提示 =====
function showSkillTip(name){
  const el=document.getElementById('skillTip');
  document.getElementById('tipName').textContent=name;
  el.style.display='block';
  el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='tipFlash .6s ease forwards';
  setTimeout(()=>el.style.display='none',600);
}

// ===== 主游戏循环 =====
function gameLoop(ts){
  if(!gameRunning){ animId=null; return; }
  const dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;

  updatePlayer(dt);
  updateEnemies(dt);
  updateBullets(dt);
  updateParticles(dt);
  updateSkillEffects(dt);
  checkWave();

  // 绘制
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBackground();
  drawSkillEffects();
  drawParticles();
  drawBullets();
  enemies.forEach(e=>drawEnemy(e));
  drawPlayer();
  drawCombo();

  animId=requestAnimationFrame(gameLoop);
}

// ===== 开始游戏 =====
function startGame(){
  document.getElementById('mainMenu').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('skillBar').style.display='flex';
  document.getElementById('overlay').style.display='none';

  initGame();
  gameRunning=true;
  lastTime=performance.now();
  animId=requestAnimationFrame(gameLoop);
}

// ===== 游戏结束 =====
function gameOver(){
  gameRunning=false;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.getElementById('overlayTitle').textContent='魂归莲花';
  document.getElementById('overlayTitle').style.color='#e8002d';
  document.getElementById('overlaySub').textContent='哪吒倒下了，但命运之战还未结束…';
  document.getElementById('overlayScore').textContent=`最终得分：${G.player.score} 分 · 第 ${G.wave} 波`;
}

// ===== 游戏胜利 =====
function gameWin(){
  gameRunning=false;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  document.getElementById('overlayTitle').textContent='逆天改命！';
  document.getElementById('overlayTitle').style.color='#ffd700';
  document.getElementById('overlaySub').textContent='「我命由我不由天」— 天命已被改写！';
  document.getElementById('overlayScore').textContent=`最终得分：${G.player.score} 分 · 全部5波清除！`;
}

// ===== 重新开始 =====
function restartGame(){
  document.getElementById('overlay').style.display='none';
  startGame();
}

// 阻止空格滚动
window.addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
</script>
